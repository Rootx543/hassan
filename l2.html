<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produits - Livraison</title>
<style>
  :root{
    --bg:#0f1115;
    --card:#171a21;
    --card2:#1f232c;
    --accent:#4fd1c5;
    --accent2:#38b2ac;
    --text:#e8eaed;
    --muted:#8a8f98;
    --border:#2a2f3a;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    min-height:100vh;
  }
  header{
    position:sticky;top:0;z-index:10;
    background:var(--bg);
    padding:14px 16px 10px;
    border-bottom:1px solid var(--border);
  }
  h1{
    font-size:19px;
    margin:0 0 10px 0;
    font-weight:700;
    letter-spacing:.2px;
  }
  .search-wrap{
    position:relative;
  }
  #search{
    width:100%;
    padding:12px 14px 12px 38px;
    border-radius:12px;
    border:1px solid var(--border);
    background:var(--card2);
    color:var(--text);
    font-size:16px;
    outline:none;
  }
  #search:focus{border-color:var(--accent);}
  .search-icon{
    position:absolute;
    left:12px;top:50%;
    transform:translateY(-50%);
    opacity:.5;
    font-size:16px;
    pointer-events:none;
  }
  .count{
    color:var(--muted);
    font-size:12px;
    margin-top:6px;
  }
  main{
    padding:10px 12px 90px;
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(150px,1fr));
    gap:10px;
  }
  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:14px;
    overflow:hidden;
    cursor:pointer;
    display:flex;
    flex-direction:column;
    transition:transform .1s ease, border-color .15s ease;
    -webkit-tap-highlight-color:transparent;
  }
  .card:active{transform:scale(.97);}
  .card.has-photo{border-color:var(--accent2);}
  .thumb{
    width:100%;
    aspect-ratio:1/1;
    background:var(--card2);
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    position:relative;
  }
  .thumb img{
    width:100%;height:100%;object-fit:cover;
  }
  .thumb .placeholder{
    font-size:28px;
    opacity:.35;
  }
  .badge{
    position:absolute;
    top:6px;right:6px;
    background:rgba(0,0,0,.55);
    color:var(--accent);
    font-size:10px;
    padding:2px 6px;
    border-radius:8px;
    font-weight:600;
  }
  .info{
    padding:8px 10px 10px;
  }
  .name{
    font-size:12.5px;
    line-height:1.3;
    font-weight:600;
    display:-webkit-box;
    -webkit-line-clamp:3;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }
  .code{
    font-size:10px;
    color:var(--muted);
    margin-top:3px;
  }
  /* Modal */
  .overlay{
    position:fixed;inset:0;
    background:rgba(0,0,0,.7);
    display:none;
    align-items:flex-end;
    justify-content:center;
    z-index:100;
  }
  .overlay.open{display:flex;}
  .sheet{
    background:var(--card);
    width:100%;
    max-width:520px;
    border-radius:18px 18px 0 0;
    padding:16px;
    max-height:88vh;
    overflow-y:auto;
    animation:slideUp .18s ease;
  }
  @keyframes slideUp{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .sheet-header{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:10px;
    margin-bottom:12px;
  }
  .sheet-title{
    font-size:16px;
    font-weight:700;
    line-height:1.3;
  }
  .sheet-code{
    color:var(--muted);
    font-size:12px;
    margin-top:4px;
  }
  .close-btn{
    background:var(--card2);
    border:none;
    color:var(--text);
    width:32px;height:32px;
    border-radius:50%;
    font-size:16px;
    flex-shrink:0;
    cursor:pointer;
  }
  .photo-area{
    width:100%;
    aspect-ratio:1/1;
    max-height:50vh;
    background:var(--card2);
    border-radius:14px;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-bottom:14px;
    border:1px dashed var(--border);
  }
  .photo-area img{
    width:100%;height:100%;object-fit:contain;
  }
  .photo-area .empty{
    color:var(--muted);
    font-size:13px;
    text-align:center;
    padding:20px;
  }
  .btn-row{
    display:flex;
    gap:10px;
  }
  .btn{
    flex:1;
    padding:13px;
    border-radius:12px;
    border:none;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
  }
  .btn-primary{
    background:var(--accent);
    color:#00332f;
  }
  .btn-danger{
    background:#3a2226;
    color:#ff8080;
  }
  input[type=file]{display:none;}
  .empty-state{
    text-align:center;
    color:var(--muted);
    padding:60px 20px;
    font-size:14px;
  }
  .toast{
    position:fixed;
    bottom:20px;left:50%;
    transform:translateX(-50%) translateY(20px);
    background:var(--accent2);
    color:#00201d;
    padding:10px 18px;
    border-radius:20px;
    font-size:13px;
    font-weight:600;
    opacity:0;
    transition:all .25s ease;
    pointer-events:none;
    z-index:200;
  }
  .toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }
  .filter-row{
    display:flex;
    gap:6px;
    margin-top:10px;
    overflow-x:auto;
    padding-bottom:2px;
  }
  .toolbar{
    display:flex;
    gap:8px;
    margin-top:10px;
  }
  .tbtn{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    padding:10px;
    border-radius:12px;
    border:1px solid var(--border);
    background:var(--card2);
    color:var(--text);
    font-size:12.5px;
    font-weight:600;
    cursor:pointer;
  }
  .tbtn:active{transform:scale(.97);}
  #importFile{display:none;}
  .backup-banner{
    display:none;
    background:#3a2c14;
    border:1px solid #6b4a1a;
    color:#f0c674;
    font-size:12px;
    padding:8px 12px;
    border-radius:10px;
    margin-top:10px;
    line-height:1.4;
  }
  .backup-banner.show{display:block;}
  .chip{
    flex-shrink:0;
    background:var(--card2);
    border:1px solid var(--border);
    color:var(--muted);
    padding:6px 12px;
    border-radius:16px;
    font-size:12px;
    cursor:pointer;
    white-space:nowrap;
  }
  .chip.active{
    background:var(--accent);
    color:#00332f;
    border-color:var(--accent);
    font-weight:600;
  }
</style>

<div class="overlay" id="menuOverlay">

    </div>
  </div>
</div>

<main>

</main>

<div class="overlay" id="overlay">

    </div>

      <button class="btn" style="background:var(--card2);color:var(--text);" id="editNameBtn">✏️ Modifier le nom</button>

    </div>
    <input type="file" id="fileInput" accept="image/*" capture="environment">

</div>

// ---------- Product overrides (ajouts / renommages / suppressions) ----------
const OVERRIDES_KEY = "produitsLivraison_overrides";
function loadOverrides(){
  try{
    return JSON.parse(localStorage.getItem(OVERRIDES_KEY)) || {added:[], renamed:{}, deleted:[]};
  }catch(e){
    return {added:[], renamed:{}, deleted:[]};
  }
}
function saveOverrides(ov){
  localStorage.setItem(OVERRIDES_KEY, JSON.stringify(ov));
}
let overrides = loadOverrides();

function getAllProducts(){
  const deleted = new Set(overrides.deleted || []);
  const base = BASE_PRODUCTS
    .filter(([name, code]) => !deleted.has(code))
    .map(([name, code]) => [overrides.renamed && overrides.renamed[code] ? overrides.renamed[code] : name, code]);
  const added = (overrides.added || [])
    .filter(p => !deleted.has(p.code))
    .map(p => [overrides.renamed && overrides.renamed[p.code] ? overrides.renamed[p.code] : p.name, p.code]);
  return base.concat(added);
}

function genCode(){
  return "C" + Date.now().toString(36).toUpperCase() + Math.floor(Math.random()*90+10);
}

async function addProduct(name){
  name = (name || "").trim();
  if(!name) return;
  const code = genCode();
  overrides.added = overrides.added || [];
  overrides.added.push({name, code});
  saveOverrides(overrides);
  render();
  showToast("Produit ajouté ✓");
}

function renameProduct(code, newName){
  newName = (newName || "").trim();
  if(!newName) return;
  const addedEntry = (overrides.added || []).find(p => p.code === code);
  if(addedEntry){
    addedEntry.name = newName;
  } else {
    overrides.renamed = overrides.renamed || {};
    overrides.renamed[code] = newName;
  }
  saveOverrides(overrides);
}

async function deleteProduct(code){
  overrides.added = (overrides.added || []).filter(p => p.code !== code);
  overrides.deleted = overrides.deleted || [];
  if(!overrides.deleted.includes(code)) overrides.deleted.push(code);
  saveOverrides(overrides);
  if(photos[code]){
    delete photos[code];
    await idbDelete(code);
  }
}

// ---------- Storage: IndexedDB (bien plus fiable et spacieux que localStorage) ----------
const DB_NAME = "produitsLivraisonDB";
const DB_VERSION = 1;
const STORE_NAME = "photos";
let db = null;
let photos = {}; // in-memory cache: code -> dataURL

function openDB(){
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const _db = e.target.result;
      if(!_db.objectStoreNames.contains(STORE_NAME)){
        _db.createObjectStore(STORE_NAME); // key = code, value = dataURL
      }
    };
    req.onsuccess = (e) => resolve(e.target.result);
    req.onerror = (e) => reject(e.target.error);
  });
}

function idbGetAll(){
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, "readonly");
    const store = tx.objectStore(STORE_NAME);
    const result = {};
    const cursorReq = store.openCursor();
    cursorReq.onsuccess = (e) => {
      const cursor = e.target.result;
      if(cursor){
        result[cursor.key] = cursor.value;
        cursor.continue();
      } else {
        resolve(result);
      }
    };
    cursorReq.onerror = (e) => reject(e.target.error);
  });
}

function idbSet(code, dataUrl){
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, "readwrite");
    tx.objectStore(STORE_NAME).put(dataUrl, code);
    tx.oncomplete = () => resolve();
    tx.onerror = (e) => reject(e.target.error);
  });
}

function idbDelete(code){
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, "readwrite");
    tx.objectStore(STORE_NAME).delete(code);
    tx.oncomplete = () => resolve();
    tx.onerror = (e) => reject(e.target.error);
  });
}

function idbSetAll(obj){
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, "readwrite");
    const store = tx.objectStore(STORE_NAME);
    Object.keys(obj).forEach(code => store.put(obj[code], code));
    tx.oncomplete = () => resolve();
    tx.onerror = (e) => reject(e.target.error);
  });
}

// ---------- Backup reminder tracking ----------
const LAST_BACKUP_KEY = "produitsLivraison_lastBackup";
const PHOTOS_SINCE_BACKUP_KEY = "produitsLivraison_sinceBackup";

function getSinceBackupCount(){
  return parseInt(localStorage.getItem(PHOTOS_SINCE_BACKUP_KEY) || "0", 10);
}
function bumpSinceBackup(){
  const n = getSinceBackupCount() + 1;
  localStorage.setItem(PHOTOS_SINCE_BACKUP_KEY, String(n));
  checkBackupBanner();
}
function resetSinceBackup(){
  localStorage.setItem(PHOTOS_SINCE_BACKUP_KEY, "0");
  localStorage.setItem(LAST_BACKUP_KEY, new Date().toISOString());
  checkBackupBanner();
}
function checkBackupBanner(){
  const banner = document.getElementById('backupBanner');
  const n = getSinceBackupCount();
  if(n >= 5){
    banner.textContent = `⚠️ ${n} nouvelles photos non sauvegardées. Clique "💾 Sauvegarder" pour ne rien perdre.`;
    banner.classList.add('show');
  } else {
    banner.classList.remove('show');
  }
}

// ---------- Export / Import ----------
function exportBackup(){
  const payload = {
    app: "produits-livraison",
    exportedAt: new Date().toISOString(),
    photos: photos,
    overrides: overrides
  };
  const blob = new Blob([JSON.stringify(payload)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `sauvegarde-produits-${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 2000);
  resetSinceBackup();
  menuOverlay.classList.remove('open');
  showToast("Sauvegarde téléchargée ✓");
}

function importBackupFile(file){
  const reader = new FileReader();
  reader.onload = async (e) => {
    try{
      const data = JSON.parse(e.target.result);
      const incomingPhotos = data.photos || data; // tolerate raw {code:dataUrl} files too
      if(typeof incomingPhotos !== 'object') throw new Error('format invalide');
      await idbSetAll(incomingPhotos);
      photos = Object.assign({}, photos, incomingPhotos);
      if(data.overrides){
        overrides = {
          added: (overrides.added || []).concat(
            (data.overrides.added || []).filter(p => !(overrides.added||[]).some(x => x.code === p.code))
          ),
          renamed: Object.assign({}, overrides.renamed || {}, data.overrides.renamed || {}),
          deleted: Array.from(new Set([...(overrides.deleted||[]), ...(data.overrides.deleted||[])]))
        };
        saveOverrides(overrides);
      }
      resetSinceBackup();
      menuOverlay.classList.remove('open');
      render();
      showToast(`Restauré : ${Object.keys(incomingPhotos).length} photo(s) ✓`);
    }catch(err){
      showToast("Erreur: fichier invalide");
    }
  };
  reader.readAsText(file);
}

document.getElementById('exportBtn').onclick = exportBackup;
document.getElementById('importBtn').onclick = () => document.getElementById('importFile').click();
document.getElementById('importFile').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if(file) importBackupFile(file);
  e.target.value = '';
});

// ---------- Render ----------
const grid = document.getElementById('grid');
const emptyState = document.getElementById('emptyState');
const countEl = document.getElementById('count');
let currentFilter = 'all';
let currentQuery = '';

function slug(code){ return code; }

function render(){
  const q = currentQuery.trim().toLowerCase();
  let items = getAllProducts().filter(([name, code]) => {
    if(q && !(name.toLowerCase().includes(q) || code.includes(q))) return false;
    const hasPhoto = !!photos[code];
    if(currentFilter === 'photo' && !hasPhoto) return false;
    if(currentFilter === 'nophoto' && hasPhoto) return false;
    return true;
  });

  grid.innerHTML = '';
  items.forEach(([name, code]) => {
    const hasPhoto = photos[code];
    const card = document.createElement('div');
    card.className = 'card' + (hasPhoto ? ' has-photo' : '');
    card.onclick = () => openSheet(name, code);
    card.innerHTML = `
      <div class="thumb">
        ${hasPhoto ? `<img src="${hasPhoto}">` : `<span class="placeholder">🧀</span>`}
        ${hasPhoto ? `<span class="badge">✓</span>` : ``}
      </div>
      <div class="info">
        <div class="name">${name}</div>
        <div class="code">#${code}</div>
      </div>
    `;
    grid.appendChild(card);
  });

  emptyState.style.display = items.length ? 'none' : 'block';
  countEl.textContent = `${items.length} produit${items.length!==1?'s':''}`;
}

// ---------- Search / filters ----------
document.getElementById('search').addEventListener('input', (e) => {
  currentQuery = e.target.value;
  render();
});

document.getElementById('filterRow').addEventListener('click', (e) => {
  const chip = e.target.closest('.chip');
  if(!chip) return;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  currentFilter = chip.dataset.filter;
  render();
});

// ---------- Menu overlay ----------
const menuOverlay = document.getElementById('menuOverlay');
document.getElementById('menuBtn').onclick = () => menuOverlay.classList.add('open');
document.getElementById('menuCloseBtn').onclick = () => menuOverlay.classList.remove('open');
menuOverlay.addEventListener('click', (e) => { if(e.target === menuOverlay) menuOverlay.classList.remove('open'); });

document.getElementById('addProductBtn').onclick = () => {
  const name = prompt("Nom du nouveau produit :");
  if(name && name.trim()){
    addProduct(name);
    menuOverlay.classList.remove('open');
  }
};

document.getElementById('editNameBtn').onclick = () => {
  if(!activeCode) return;
  const current = sheetTitle.textContent;
  const newName = prompt("Modifier le nom du produit :", current);
  if(newName && newName.trim() && newName.trim() !== current){
    renameProduct(activeCode, newName);
    sheetTitle.textContent = newName.trim();
    showToast("Nom modifié ✓");
  }
};

document.getElementById('deleteProductBtn').onclick = async () => {
  if(!activeCode) return;
  const ok = confirm("Supprimer ce produit et sa photo ? Cette action est irréversible.");
  if(!ok) return;
  await deleteProduct(activeCode);
  closeSheet();
  showToast("Produit supprimé");
};

// ---------- Sheet / modal ----------
const overlay = document.getElementById('overlay');
const sheetTitle = document.getElementById('sheetTitle');
const sheetCode = document.getElementById('sheetCode');
const photoArea = document.getElementById('photoArea');
const fileInput = document.getElementById('fileInput');
let activeCode = null;

function openSheet(name, code){
  activeCode = code;
  sheetTitle.textContent = name;
  sheetCode.textContent = '#' + code;
  renderPhotoArea();
  overlay.classList.add('open');
}
function closeSheet(){
  overlay.classList.remove('open');
  activeCode = null;
  render();
}
function renderPhotoArea(){
  const p = photos[activeCode];
  photoArea.innerHTML = p
    ? `<img src="${p}">`
    : `<div class="empty">Aucune photo — ajoutez-en une</div>`;
}

document.getElementById('closeBtn').onclick = closeSheet;
overlay.addEventListener('click', (e) => { if(e.target === overlay) closeSheet(); });

document.getElementById('addPhotoBtn').onclick = () => fileInput.click();

fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if(!file || !activeCode) return;
  const reader = new FileReader();
  reader.onload = async (ev) => {
    // compress/resize before storing to keep DB lean and backups small
    const dataUrl = await resizeImage(ev.target.result, 900);
    photos[activeCode] = dataUrl;
    await idbSet(activeCode, dataUrl);
    bumpSinceBackup();
    renderPhotoArea();
    showToast("Photo enregistrée ✓");
  };
  reader.readAsDataURL(file);
  fileInput.value = '';
});

document.getElementById('removePhotoBtn').onclick = async () => {
  if(!activeCode) return;
  delete photos[activeCode];
  await idbDelete(activeCode);
  bumpSinceBackup();
  renderPhotoArea();
  showToast("Photo retirée");
};

function resizeImage(dataUrl, maxDim){
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      let {width, height} = img;
      if(width > height && width > maxDim){
        height = Math.round(height * (maxDim/width));
        width = maxDim;
      } else if(height > maxDim){
        width = Math.round(width * (maxDim/height));
        height = maxDim;
      }
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);
      resolve(canvas.toDataURL('image/jpeg', 0.82));
    };
    img.onerror = () => resolve(dataUrl); // fallback: keep original
    img.src = dataUrl;
  });
}

// ---------- Toast ----------
let toastTimer;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1600);
}

async function init(){
  try{
    db = await openDB();
    photos = await idbGetAll();
  }catch(e){
    showToast("Erreur de stockage — mode limité");
    photos = {};
  }
  checkBackupBanner();
  render();
}
init();

window.addEventListener('beforeunload', (e) => {
  if(getSinceBackupCount() >= 3){
    e.preventDefault();
    e.returnValue = '';
  }
});
</script>
