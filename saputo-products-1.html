<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
<meta name="theme-color" content="#f5b942" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Saputo" />
<meta name="mobile-web-app-capable" content="yes" />
<title>Saputo Products</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23f5b942'/%3E%3Ctext x='50' y='68' font-size='58' font-family='Georgia,serif' font-weight='900' text-anchor='middle' fill='%231a1a1a'%3ES%3C/text%3E%3C/svg%3E" />
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23f5b942'/%3E%3Ctext x='50' y='68' font-size='58' font-family='Georgia,serif' font-weight='900' text-anchor='middle' fill='%231a1a1a'%3ES%3C/text%3E%3C/svg%3E" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --panel-2:#1f242d; --line:#2a3140;
    --text:#e7ecf3; --muted:#9aa5b5; --accent:#f5b942; --accent-2:#3b82f6;
    --good:#22c55e; --warn:#f59e0b; --danger:#ef4444; --chip:#222936;
    --safe-top:env(safe-area-inset-top,0px);
    --safe-bot:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;
    -webkit-font-smoothing:antialiased; overscroll-behavior-y:contain;
  }
  body{padding-top:var(--safe-top);padding-bottom:var(--safe-bot)}
  a{color:var(--accent-2);text-decoration:none}

  /* Top bar (sticky) */
  header.topbar{
    position:sticky;top:0;z-index:30;
    background:linear-gradient(180deg,#161a22 0%,#12151b 100%);
    border-bottom:1px solid var(--line);
    padding:calc(var(--safe-top) + 8px) 14px 8px;
  }
  .top-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .brand{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px;flex:1;min-width:0}
  .logo{
    width:30px;height:30px;border-radius:8px;background:var(--accent);
    display:flex;align-items:center;justify-content:center;color:#1a1a1a;
    font-weight:900;font-family:ui-serif,Georgia,serif;font-size:17px;flex-shrink:0;
  }
  .brand small{color:var(--muted);font-weight:500;font-size:11px;display:block;line-height:1.1}
  .brand div{overflow:hidden;line-height:1.15}
  .topbar .stat{font-size:11px;color:var(--muted);white-space:nowrap}
  .topbar .stat b{color:var(--text)}
  .install-btn{
    background:var(--accent);color:#1a1a1a;border:0;padding:6px 10px;
    border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;
    display:none;
  }
  .install-btn.show{display:inline-block}

  /* Sticky search */
  .search{
    position:relative;display:flex;gap:6px;align-items:center;
  }
  .search input{
    flex:1;padding:11px 14px 11px 36px;border-radius:11px;
    background:var(--panel);color:var(--text);border:1px solid var(--line);
    font-size:15px;outline:none;min-width:0;
  }
  .search input:focus{border-color:var(--accent)}
  .search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);opacity:.6;pointer-events:none}
  .search .clear-x{
    position:absolute;right:8px;top:50%;transform:translateY(-50%);
    background:transparent;border:0;color:var(--muted);font-size:18px;cursor:pointer;padding:6px;display:none;
  }
  .search .clear-x.show{display:block}

  /* Quick chip scroller */
  .chip-row{
    display:flex;gap:6px;overflow-x:auto;padding:10px 14px 6px;
    scrollbar-width:none;
  }
  .chip-row::-webkit-scrollbar{display:none}
  .chip{
    flex-shrink:0;display:inline-flex;align-items:center;gap:5px;
    padding:6px 12px;border-radius:999px;background:var(--chip);
    color:var(--text);border:1px solid transparent;font-size:12px;cursor:pointer;
    user-select:none;white-space:nowrap;
  }
  .chip.active{background:var(--accent);color:#1a1a1a;font-weight:600}
  .chip .ct{opacity:.6;font-weight:500;font-size:11px}

  /* Quick action buttons (mobile) */
  .quick-actions{
    display:flex;gap:8px;padding:6px 14px 10px;
  }
  .qa{
    flex:1;background:var(--panel);border:1px solid var(--line);
    color:var(--text);border-radius:10px;padding:8px;
    display:flex;align-items:center;justify-content:center;gap:6px;
    font-size:12px;font-weight:500;cursor:pointer;
  }
  .qa i{font-size:14px;color:var(--accent)}
  .qa:active{background:var(--panel-2)}

  /* Section titles */
  .sec-title{
    font-size:11px;letter-spacing:1.3px;color:var(--muted);
    text-transform:uppercase;padding:14px 14px 6px;
    display:flex;align-items:center;justify-content:space-between;
  }
  .sec-title a{color:var(--accent-2);font-size:11px;cursor:pointer;letter-spacing:0}

  /* Recents horizontal scroll */
  .recents{
    display:flex;gap:10px;overflow-x:auto;padding:0 14px 6px;
    scrollbar-width:none;
  }
  .recents::-webkit-scrollbar{display:none}
  .recent-card{
    flex-shrink:0;width:120px;background:var(--panel);border:1px solid var(--line);
    border-radius:12px;overflow:hidden;cursor:pointer;
  }
  .recent-card .img{aspect-ratio:1;background:#0a0d12;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
  .recent-card .img img{width:100%;height:100%;object-fit:cover}
  .recent-card .img .ph{font-size:10px;color:#3a4356}
  .recent-card .name{font-size:11px;padding:6px 8px 8px;line-height:1.25;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .recent-card .photo-dot{
    position:absolute;bottom:5px;right:5px;background:var(--good);
    width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    color:#0a1f10;font-size:10px;
  }

  /* Product grid (2 cols on mobile, more on larger) */
  main{padding:0 0 90px}
  .grid{
    display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:6px 14px 14px;
  }
  @media (min-width:600px){.grid{grid-template-columns:repeat(3,1fr);gap:12px}}
  @media (min-width:900px){.grid{grid-template-columns:repeat(4,1fr)}}
  .card{
    background:var(--panel);border:1px solid var(--line);border-radius:12px;
    overflow:hidden;cursor:pointer;display:flex;flex-direction:column;
    transition:transform .08s ease;
  }
  .card:active{transform:scale(.98)}
  .card .img{
    aspect-ratio:1;background:#0a0d12;
    display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;
  }
  .card .img img{width:100%;height:100%;object-fit:cover;display:block}
  .card .img .ph{color:#3a4356;font-size:10px;text-align:center;padding:6px}
  .badge{
    position:absolute;top:6px;left:6px;background:rgba(0,0,0,.7);
    color:#fff;font-size:9px;padding:2px 6px;border-radius:999px;letter-spacing:.4px;
    font-weight:600;
  }
  .badge.brand-SAP{background:#1e3a8a}
  .badge.brand-ARM{background:#7c2d12}
  .badge.brand-KFT{background:#4c1d95}
  .badge.brand-ORB{background:#065f46}
  .badge.brand-WOO{background:#9a3412}
  .badge.brand-COG{background:#3f3f46}
  .badge.brand-NTL,.badge.brand-NLS{background:#0e7490}
  .badge.brand-MZB{background:#7e22ce}
  .badge.brand-MTL{background:#9333ea}
  .badge.brand-LSM,.badge.brand-MFS{background:#0891b2}
  .badge.brand-BLV{background:#a16207}
  .badge.brand-VIA{background:#be123c}
  .badge.brand-PMO,.badge.brand-SLA{background:#dc2626}
  .badge.brand-BNB{background:#475569}
  .badge.brand-DLD{background:#0369a1}
  .badge.brand-LOGISTICS{background:#b91c1c}
  .badge.brand-2GO,.badge.brand-2GS{background:#16a34a}
  .badge.brand-SRR{background:#ea580c}
  .badge.brand-SMN{background:#db2777}
  .badge.brand-UCO{background:#0d9488}
  .badge.brand-FML{background:#a21caf}
  .badge.brand-FDR,.badge.brand-FAP{background:#4d7c0f}
  .badge.brand-OTHER{background:#475569}

  .body{padding:8px 10px 10px;display:flex;flex-direction:column;gap:4px;flex:1}
  .title{font-size:12px;font-weight:600;line-height:1.25;color:var(--text);
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .meta{font-size:10px;color:var(--muted);display:flex;gap:4px;flex-wrap:wrap}
  .meta .pill{background:#222936;border:1px solid var(--line);padding:1px 5px;border-radius:4px}
  .card .actions{display:flex;gap:4px;padding:0 8px 8px;margin-top:auto}
  .card .actions button{
    flex:1;background:var(--panel-2);border:1px solid var(--line);color:var(--text);
    padding:5px;font-size:10px;border-radius:6px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:3px;
  }
  .card .actions button.save-btn.has-photo{background:var(--good);color:#0a1f10;border-color:transparent}
  .card .actions button.save-btn{background:var(--accent);color:#1a1a1a;font-weight:600;border-color:transparent}
  .card .actions button:active{filter:brightness(1.2)}

  .empty{padding:60px 20px;text-align:center;color:var(--muted)}
  .empty h2{color:var(--text);margin:0 0 6px;font-size:18px}
  .empty p{font-size:13px;margin:4px 0}

  /* Modal — full screen on mobile */
  .modal-back{
    position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:50;
    display:none;overflow:auto;
  }
  .modal-back.open{display:block}
  .modal{
    background:var(--panel);min-height:100%;
    display:flex;flex-direction:column;
  }
  .modal .head{
    display:flex;align-items:center;justify-content:space-between;gap:8px;
    padding:calc(var(--safe-top) + 8px) 14px 8px;
    background:linear-gradient(180deg,#161a22 0%,#12151b 100%);
    border-bottom:1px solid var(--line);
    position:sticky;top:0;z-index:2;
  }
  .modal .head .x{
    background:transparent;border:0;color:var(--muted);font-size:24px;
    cursor:pointer;padding:6px 8px;line-height:1;
  }
  .modal .head .head-info{flex:1;min-width:0;overflow:hidden}
  .modal .head h2{margin:0;font-size:15px;line-height:1.25;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .modal .head .sub{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .modal .pic-wrap{position:relative;background:#0a0d12;flex-shrink:0}
  .modal .pic{
    width:100%;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;
    background:#0a0d12;position:relative;overflow:hidden;
  }
  .modal .pic img{max-width:100%;max-height:100%;object-fit:contain}
  .modal .pic .empty-ph{color:#3a4356;font-size:12px}

  .photo-strip{
    display:flex;gap:6px;padding:8px 14px;overflow-x:auto;background:#0a0d12;
    border-bottom:1px solid var(--line);
  }
  .photo-strip::-webkit-scrollbar{display:none}
  .photo-thumb{
    flex-shrink:0;width:60px;height:60px;border-radius:8px;overflow:hidden;
    background:#222;position:relative;cursor:pointer;border:1px solid var(--line);
  }
  .photo-thumb img{width:100%;height:100%;object-fit:cover}
  .photo-thumb .del{
    position:absolute;top:2px;right:2px;background:rgba(0,0,0,.7);color:#fff;
    width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:10px;cursor:pointer;
  }
  .photo-add{
    flex-shrink:0;width:60px;height:60px;border-radius:8px;
    background:#1a1f29;border:2px dashed var(--line);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    color:var(--muted);font-size:10px;cursor:pointer;gap:2px;
  }
  .photo-add:active{background:#222936}
  .photo-add i{font-size:18px;color:var(--accent)}

  .info{padding:14px;flex:1}
  .modal h3{margin:0 0 4px;font-size:17px;line-height:1.25}
  .modal .sub2{color:var(--muted);font-size:12px;margin-bottom:10px}
  .modal .desc{font-size:13px;line-height:1.5;color:#cdd5e0;margin:0 0 12px}
  .modal .kv{display:grid;grid-template-columns:90px 1fr;gap:5px 10px;font-size:12px;margin-bottom:12px}
  .modal .kv b{color:var(--muted);font-weight:500}
  .modal table{width:100%;border-collapse:collapse;font-size:11px}
  .modal th,.modal td{text-align:left;padding:6px 6px;border-bottom:1px solid var(--line)}
  .modal th{color:var(--muted);font-weight:500;text-transform:uppercase;font-size:9px;letter-spacing:1px}
  .modal .pill{display:inline-block;padding:2px 6px;border-radius:5px;background:#222936;
    border:1px solid var(--line);font-size:10px;color:#cdd5e0}

  .actions{
    display:flex;gap:8px;padding:10px 14px calc(10px + var(--safe-bot));
    background:var(--panel);border-top:1px solid var(--line);
    position:sticky;bottom:0;z-index:2;
  }
  .btn{
    flex:1;padding:11px 12px;border-radius:9px;border:1px solid var(--line);
    background:var(--panel-2);color:var(--text);font-size:13px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:6px;font-weight:500;
  }
  .btn.primary{background:var(--accent);color:#1a1a1a;font-weight:600;border-color:transparent}
  .btn.photo{background:var(--good);color:#0a1f10;font-weight:600;border-color:transparent}
  .btn:active{filter:brightness(1.1)}

  .logistics .pic{background:repeating-linear-gradient(45deg,#1a1f29,#1a1f29 10px,#161a22 10px,#161a22 20px)}
  .logistics h3{color:var(--danger)}

  /* Bottom nav */
  .bottom-nav{
    position:fixed;bottom:0;left:0;right:0;z-index:25;
    background:rgba(15,17,21,.95);backdrop-filter:blur(8px);
    border-top:1px solid var(--line);
    display:grid;grid-template-columns:repeat(4,1fr);
    padding-bottom:var(--safe-bot);
  }
  .bn{
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
    padding:8px 4px;color:var(--muted);font-size:10px;cursor:pointer;
    background:transparent;border:0;
  }
  .bn i{font-size:18px}
  .bn.active{color:var(--accent)}
  .bn .ct{
    position:absolute;margin-top:-22px;margin-left:14px;
    background:var(--accent);color:#1a1a1a;font-weight:700;
    min-width:18px;height:18px;border-radius:9px;padding:0 5px;
    display:flex;align-items:center;justify-content:center;font-size:10px;
  }

  /* Toast */
  .toast{
    position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
    background:#1f2937;border:1px solid var(--line);color:#fff;
    padding:10px 16px;border-radius:10px;font-size:13px;z-index:60;
    opacity:0;pointer-events:none;transition:opacity .2s;
    max-width:90%;text-align:center;
  }
  .toast.show{opacity:1}

  /* Sort dropdown (mobile-friendly) */
  .sort-bar{
    display:flex;align-items:center;gap:6px;padding:6px 14px;
    background:var(--panel);border-top:1px solid var(--line);
    font-size:11px;color:var(--muted);
  }
  .sort-bar select{
    background:var(--panel-2);color:var(--text);border:1px solid var(--line);
    padding:5px 8px;border-radius:7px;font-size:12px;cursor:pointer;
    flex:1;max-width:160px;
  }
  .sort-bar .toggle-view{
    display:flex;background:var(--panel-2);border:1px solid var(--line);
    border-radius:7px;overflow:hidden;margin-left:auto;
  }
  .sort-bar .toggle-view button{
    background:transparent;color:var(--muted);border:0;padding:5px 9px;
    font-size:12px;cursor:pointer;
  }
  .sort-bar .toggle-view button.active{background:var(--accent);color:#1a1a1a;font-weight:600}

  /* List view */
  .grid.list{grid-template-columns:1fr;gap:6px}
  .grid.list .card{flex-direction:row;align-items:stretch}
  .grid.list .card .img{width:80px;aspect-ratio:1;flex-shrink:0}
  .grid.list .card .body{flex:1;padding:8px 10px}
  .grid.list .card .actions{flex-direction:column;padding:8px;width:80px;flex-shrink:0;justify-content:center}
  .grid.list .card .actions button{font-size:9px;padding:4px 2px}

  /* Photo viewer (lightbox) */
  .lightbox{
    position:fixed;inset:0;z-index:70;background:rgba(0,0,0,.95);
    display:none;align-items:center;justify-content:center;padding:20px;
  }
  .lightbox.open{display:flex}
  .lightbox img{max-width:100%;max-height:90vh;object-fit:contain}
  .lightbox .lb-x{
    position:absolute;top:calc(var(--safe-top) + 12px);right:14px;
    background:rgba(0,0,0,.6);border:0;color:#fff;font-size:24px;
    width:40px;height:40px;border-radius:50%;cursor:pointer;
  }
  .lightbox .lb-del{
    position:absolute;bottom:calc(var(--safe-bot) + 24px);right:14px;
    background:var(--danger);border:0;color:#fff;font-size:14px;
    padding:10px 16px;border-radius:10px;cursor:pointer;font-weight:600;
  }

  /* Hidden file input */
  .hidden-input{display:none}

  /* Tap to add photo overlay */
  .pic-tap{
    position:absolute;bottom:8px;right:8px;
    background:rgba(0,0,0,.7);color:#fff;border:0;width:36px;height:36px;
    border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;
    font-size:14px;backdrop-filter:blur(4px);
  }
  .pic-tap:active{background:var(--accent);color:#1a1a1a}

  /* Storage usage indicator */
  .storage-info{
    position:fixed;top:calc(var(--safe-top) + 6px);right:10px;
    background:rgba(0,0,0,.6);color:#9aa5b5;font-size:10px;
    padding:3px 7px;border-radius:6px;z-index:31;display:none;
  }
  .storage-info.show{display:block}
</style>
</head>
<body>

<div class="storage-info" id="storage-info"></div>

<header class="topbar">
  <div class="top-row">
    <div class="brand">
      <div class="logo">S</div>
      <div>
        Saputo Catalog
        <small>Quebec Foodservice</small>
      </div>
    </div>
    <button class="install-btn" id="install-btn"><i class="fa-solid fa-download"></i> Install</button>
    <div class="stat" id="stat"><b id="stat-shown">0</b>/<b id="stat-total">0</b></div>
  </div>
  <div class="search">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    <input id="q" type="search" placeholder="Search code, name, brand…" autocomplete="off" inputmode="search" />
    <button class="clear-x" id="clear-x">×</button>
  </div>
</header>

<div class="quick-actions">
  <button class="qa" data-quick="recents"><i class="fa-solid fa-clock-rotate-left"></i> Recent</button>
  <button class="qa" data-quick="photos"><i class="fa-solid fa-camera"></i> With photos</button>
  <button class="qa" data-quick="all"><i class="fa-solid fa-border-all"></i> All</button>
</div>

<div class="chip-row" id="cat-chips"></div>
<div class="chip-row" id="brand-chips"></div>

<div class="sort-bar">
  <span>Sort:</span>
  <select id="sort">
    <option value="name">Name A→Z</option>
    <option value="brand">Brand</option>
    <option value="cat">Category</option>
    <option value="code">Code</option>
    <option value="recent">Recent</option>
  </select>
  <div class="toggle-view" id="view-toggle">
    <button data-view="grid" class="active"><i class="fa-solid fa-grip"></i></button>
    <button data-view="list"><i class="fa-solid fa-list"></i></button>
  </div>
</div>

<main>
  <div id="recents-section" style="display:none">
    <div class="sec-title">
      <span><i class="fa-solid fa-clock-rotate-left"></i> Recently viewed</span>
      <a id="clear-recents">Clear</a>
    </div>
    <div class="recents" id="recents"></div>
  </div>
  <div id="results-section">
    <div class="sec-title">
      <span id="results-label">All products</span>
      <span id="results-count" style="color:var(--muted)"></span>
    </div>
    <div id="grid" class="grid"></div>
    <div id="empty" class="empty" style="display:none">
      <i class="fa-solid fa-magnifying-glass" style="font-size:32px;opacity:.4;margin-bottom:12px;display:block"></i>
      <h2>Nothing found</h2>
      <p>Try a different search or clear filters.</p>
    </div>
  </div>

/* ==================== INDEXEDDB (photos) ==================== */
const DB_NAME = "saputo-pwa-db";
const DB_VER = 1;
let dbPromise = null;
function openDB(){
  if(dbPromise) return dbPromise;
  dbPromise = new Promise((resolve, reject) => {
    if(!('indexedDB' in window)){
      reject(new Error("IndexedDB not supported in this browser/mode"));
      return;
    }
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if(!db.objectStoreNames.contains("photos")){
        const s = db.createObjectStore("photos", { keyPath: "id", autoIncrement: true });
        s.createIndex("byProduct", "productId", { unique:false });
        s.createIndex("byTime", "ts", { unique:false });
      }
    };
    req.onsuccess = ()=>resolve(req.result);
    req.onerror = ()=>{ dbPromise = null; reject(req.error); };
  });
  return dbPromise;
}
// Ask the browser to treat this site's storage as persistent so saved photos
// survive long periods of inactivity instead of being auto-evicted.
if(navigator.storage && navigator.storage.persist){
  navigator.storage.persist().catch(()=>{});
}
async function savePhoto(productId, blob){
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction("photos","readwrite");
    const store = tx.objectStore("photos");
    const rec = { productId, blob, ts: Date.now() };
    const r = store.add(rec);
    r.onsuccess = ()=>res(r.result);
    r.onerror = ()=>rej(r.error);
  });
}
async function getPhotosForProduct(productId){
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction("photos","readonly");
    const idx = tx.objectStore("photos").index("byProduct");
    const r = idx.getAll(productId);
    r.onsuccess = ()=>res(r.result.sort((a,b)=>b.ts-a.ts));
    r.onerror = ()=>rej(r.error);
  });
}
async function getAllProductsWithPhotos(){
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction("photos","readonly");
    const r = tx.objectStore("photos").getAll();
    r.onsuccess = ()=>{
      const map = {};
      r.result.forEach(p => {
        if(!map[p.productId]) map[p.productId] = [];
        map[p.productId].push(p);
      });
      res(map);
    };
    r.onerror = ()=>rej(r.error);
  });
}
async function deletePhoto(id){
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction("photos","readwrite");
    const r = tx.objectStore("photos").delete(id);
    r.onsuccess = ()=>res();
    r.onerror = ()=>rej(r.error);
  });
}
async function totalPhotoBytes(){
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction("photos","readonly");
    const r = tx.objectStore("photos").getAll();
    r.onsuccess = ()=>{
      const total = r.result.reduce((sum,p)=>sum + (p.blob?.size||0), 0);
      res(total);
    };
    r.onerror = ()=>rej(r.error);
  });
}

/* Convert blob to an object URL for display, caching per photo id so we don't
   leak a new blob: URL every time the grid re-renders. */
const photoUrlCache = new Map(); // photoId -> object URL
function blobToUrl(b){ return URL.createObjectURL(b); }
function photoUrl(photoRecord){
  if(!photoRecord) return "";
  let url = photoUrlCache.get(photoRecord.id);
  if(!url){
    url = URL.createObjectURL(photoRecord.blob);
    photoUrlCache.set(photoRecord.id, url);
  }
  return url;
}
function releasePhotoUrl(photoId){
  const url = photoUrlCache.get(photoId);
  if(url){ URL.revokeObjectURL(url); photoUrlCache.delete(photoId); }
}

function buildChips(){
  const cats = uniq(PRODUCTS.map(p=>p.category)).sort();
  const catBox = $("#cat-chips");
  catBox.innerHTML = `<span class="chip active" data-cat="__all">All</span>` +
    cats.map(c=>`<span class="chip" data-cat="${esc(c)}">${esc(c)}</span>`).join("");
  catBox.addEventListener("click", e=>{
    const c = e.target.closest(".chip"); if(!c) return;
    if(c.dataset.cat==="__all"){state.cats.clear();catBox.querySelectorAll(".chip").forEach(x=>x.classList.remove("active"));c.classList.add("active");}
    else {const all=catBox.querySelector('[data-cat="__all"]');all.classList.remove("active");c.classList.toggle("active");
      if(c.classList.contains("active")) state.cats.add(c.dataset.cat); else state.cats.delete(c.dataset.cat);
      if(!state.cats.size) all.classList.add("active");
    }
    render();
  });
  const brands = uniq(PRODUCTS.map(p=>p.brand)).sort();
  const brandBox = $("#brand-chips");
  brandBox.innerHTML = `<span class="chip active" data-brand="__all">All</span>` +
    brands.map(b=>{
      const n = PRODUCTS.filter(p=>p.brand===b).length;
      return `<span class="chip" data-brand="${esc(b)}">${esc(b)} <span class="ct">${n}</span></span>`;
    }).join("");
  brandBox.addEventListener("click", e=>{
    const c = e.target.closest(".chip"); if(!c) return;
    if(c.dataset.brand==="__all"){state.brands.clear();brandBox.querySelectorAll(".chip").forEach(x=>x.classList.remove("active"));c.classList.add("active");}
    else {const all=brandBox.querySelector('[data-brand="__all"]');all.classList.remove("active");c.classList.toggle("active");
      if(c.classList.contains("active")) state.brands.add(c.dataset.brand); else state.brands.delete(c.dataset.brand);
      if(!state.brands.size) all.classList.add("active");
    }
    render();
  });
}

/* ==================== FILTER ==================== */
function matches(p){
  if(state.types.size===1 && state.types.has("product") && p.isLogistics) return false;
  if(state.types.size===1 && state.types.has("logistics") && !p.isLogistics) return false;
  if(state.types.size===0) return false;
  if(state.cats.size && !state.cats.has(p.category)) return false;
  if(state.brands.size && !state.brands.has(p.brand)) return false;
  if(state.q){
    const q = state.q.toLowerCase().trim();
    if(q){
      const hay = [p.name, p.brand, p.category, p.format, ...p.codes.flatMap(c=>[String(c.code), c.desc, c.format])].join(" ").toLowerCase();
      if(!hay.includes(q)) return false;
    }
  }
  return true;
}
function sortList(arr){
  const s = state.sort;
  if(s==="name")   return arr.sort((a,b)=>a.name.localeCompare(b.name));
  if(s==="brand")  return arr.sort((a,b)=>a.brand.localeCompare(b.brand)||a.name.localeCompare(b.name));
  if(s==="cat")    return arr.sort((a,b)=>a.category.localeCompare(b.category)||a.name.localeCompare(b.name));
  if(s==="code")   return arr.sort((a,b)=>(a.codes[0]?.code||"").localeCompare(b.codes[0]?.code||""));
  if(s==="recent") return arr.sort((a,b)=>{
    const ia = state.recents.indexOf(a.id), ib = state.recents.indexOf(b.id);
    if(ia===-1 && ib===-1) return a.name.localeCompare(b.name);
    if(ia===-1) return 1; if(ib===-1) return -1;
    return ia-ib;
  });
  return arr;
}

function cardHTML(p, opts={}){
  const inList = state.myList.includes(p.id);
  const userPhotos = photoMap[p.id];
  const hasPhoto = userPhotos?.length > 0;
  const code0 = p.codes[0]?.code ? `#${p.codes[0].code}` : "—";
  // Prefer the user's own saved photo of this product; fall back to the catalog stock photo.
  const imgHTML = hasPhoto
    ? `<img src="${photoUrl(userPhotos[0])}" alt="${esc(p.name)}" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'ph',textContent:'photo unreadable'}))"/>`
    : p.image
      ? `<img src="${esc(p.image)}" alt="${esc(p.name)}" loading="lazy" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'ph',textContent:'no img'}))"/>`
      : `<div class="ph">⚠<br/>not a product</div>`;
  return `
    <div class="card" data-id="${p.id}">
      <div class="img">
        <span class="badge brand-${esc(p.brand)}">${esc(p.brand)}</span>
        ${imgHTML}
        ${hasPhoto ? '<span class="photo-dot"><i class="fa-solid fa-camera" style="font-size:9px"></i></span>' : ''}
      </div>
      <div class="body">
        <div class="title">${esc(p.name)}</div>
        <div class="meta">
          <span class="pill">${esc(p.format)}</span>
          <span class="pill">${esc(code0)}</span>
        </div>
      </div>
      <div class="actions">
        <button class="save-btn ${hasPhoto?'has-photo':(inList?'':'')}" data-act="save" data-id="${p.id}">
          <i class="fa-solid ${hasPhoto?'fa-camera':'fa-bookmark'}"></i> ${hasPhoto?photoMap[p.id].length:inList?'Saved':'Save'}
        </button>
        <button data-act="cam" data-id="${p.id}"><i class="fa-solid fa-camera-retro"></i> Photo</button>
      </div>
    </div>`;
}

async function render(){
  await refreshPhotoMap();
  let filtered;
  if(state.tab==="list"){
    filtered = sortList(PRODUCTS.filter(p=>state.myList.includes(p.id)));
    $("#results-label").textContent = "My saved products";
  } else if(state.tab==="photos"){
    const ids = Object.keys(photoMap);
    filtered = sortList(PRODUCTS.filter(p=>ids.includes(p.id) && matches(p)));
    $("#results-label").textContent = "Products with photos";
  } else {
    filtered = sortList(PRODUCTS.filter(matches));
    $("#results-label").textContent = state.q ? `Search: "${state.q}"` : "All products";
  }
  const grid = $("#grid");
  grid.className = "grid " + (state.view==="list" ? "list" : "");
  grid.innerHTML = filtered.map(cardHTML).join("");

  $("#stat-total").textContent = PRODUCTS.length;
  $("#stat-shown").textContent = filtered.length;
  $("#results-count").textContent = `${filtered.length} item${filtered.length!==1?"s":""}`;
  $("#empty").style.display = filtered.length ? "none" : "block";

  // bottom nav badge
  const listCt = state.myList.length;
  $("#bn-list-ct").textContent = listCt;
  $("#bn-list-ct").style.display = listCt ? "flex" : "none";

  // Show recents only on browse
  if(state.tab==="browse" && state.recents.length){
    const rec = state.recents.slice(0,10).map(id => PRODUCTS.find(p=>p.id===id)).filter(Boolean);
    if(rec.length){
      $("#recents-section").style.display = "block";
      $("#recents").innerHTML = rec.map(p=>{
        const userPhotos = photoMap[p.id];
        const thumb = userPhotos?.length
          ? `<img src="${photoUrl(userPhotos[0])}" alt=""/>`
          : (p.image ? `<img src="${esc(p.image)}" alt="" loading="lazy"/>` : `<div class="ph">no img</div>`);
        return `
        <div class="recent-card" data-id="${p.id}">
          <div class="img">
            ${thumb}
            ${userPhotos?.length ? '<span class="photo-dot"><i class="fa-solid fa-camera" style="font-size:9px"></i></span>':''}
          </div>
          <div class="name">${esc(p.name)}</div>
        </div>`;
      }).join("");
      $("#recents").querySelectorAll(".recent-card").forEach(c=>{
        c.addEventListener("click", ()=>openModal(c.dataset.id));
      });
    } else $("#recents-section").style.display = "none";
  } else $("#recents-section").style.display = "none";

  // Storage info
  const total = await totalPhotoBytes().catch(()=>0);
  if(total > 0){
    const mb = (total/1024/1024).toFixed(1);
    $("#storage-info").textContent = `📷 ${mb} MB stored`;
    $("#storage-info").classList.add("show");
  } else $("#storage-info").classList.remove("show");

  // bind cards
  bindCards();
}

function bindCards(){
  $$("#grid .card").forEach(card=>{
    card.addEventListener("click", e=>{
      if(e.target.closest("button")) return;
      openModal(card.dataset.id);
    });
  });
  $$("#grid .save-btn").forEach(b=>{
    b.addEventListener("click", e=>{
      e.stopPropagation();
      toggleList(b.dataset.id);
    });
  });
  $$("#grid [data-act='cam']").forEach(b=>{
    b.addEventListener("click", e=>{
      e.stopPropagation();
      openPhotoCapture(b.dataset.id);
    });
  });
}

let currentModalId = null;
let currentModalPhotos = [];

async function openModal(id){
  const p = PRODUCTS.find(x=>x.id===id); if(!p) return;
  currentModalId = id;
  addRecent(id);

  $("#m-h-title").textContent = p.name;
  $("#m-h-sub").innerHTML = `<span class="badge brand-${esc(p.brand)}" style="position:static;font-size:10px;padding:2px 7px">${esc(p.brand)}</span> · ${esc(p.category)}`;

  const pic = $("#m-pic");
  if(p.image){
    pic.innerHTML = `<img src="${esc(p.image)}" alt="${esc(p.name)}"/>`;
  } else {
    pic.innerHTML = `<div class="empty-ph">⚠ Logistics / deposit<br/>not a real product</div>`;
  }

  // photo strip
  currentModalPhotos = await getPhotosForProduct(id).catch(()=>[]);
  renderPhotoStrip(p);

  const rows = p.codes.map(c=>`
    <tr>
      <td><code>${esc(String(c.code))}</code></td>
      <td>${esc(c.desc)}</td>
      <td><span class="pill">${esc(c.format)}</span></td>
    </tr>`).join("");
  const allCodes = uniq(p.codes.map(c=>String(c.code))).join(", ");
  $("#m-info").innerHTML = `
    <h3>${esc(p.name)}</h3>
    <div class="sub2">${esc(p.category)} · ${esc(p.format)}</div>
    <p class="desc">${esc(p.desc)}</p>
    <div class="kv">
      <b>Brand</b><div>${esc(p.brand)}</div>
      <b>Format</b><div>${esc(p.format)}</div>
      <b>SKU count</b><div>${p.codes.length}</div>
      <b>Codes</b><div><code>${esc(allCodes)}</code></div>
    </div>
    <table>
      <thead><tr><th>Code</th><th>Description</th><th>Format</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  `;
  // actions
  const inList = state.myList.includes(p.id);
  const hasPhotos = currentModalPhotos.length > 0;
  $("#m-actions").innerHTML = `
    <button class="btn primary" id="m-act-save"><i class="fa-solid fa-bookmark"></i> ${inList?"Remove":"Save"}</button>
    <button class="btn photo" id="m-act-cam"><i class="fa-solid fa-camera"></i> ${hasPhotos?`Photo (${hasPhotos})`:"Take Photo"}</button>
    <button class="btn" id="m-act-copy"><i class="fa-solid fa-copy"></i> Codes</button>
  `;
  $("#m-act-save").onclick = ()=>{ toggleList(p.id); openModal(id); };
  $("#m-act-cam").onclick = ()=> openPhotoCapture(id);
  $("#m-act-copy").onclick = ()=>{
    navigator.clipboard?.writeText(allCodes);
    toast("Codes copied");
  };

  $("#modal").classList.toggle("logistics", !!p.isLogistics);
  $("#modal-back").classList.add("open");
  document.body.style.overflow = "hidden";
}

function renderPhotoStrip(p){
  const strip = $("#m-photos");
  const photos = currentModalPhotos;
  strip.innerHTML = photos.map(ph => `
    <div class="photo-thumb" data-pid="${ph.id}">
      <img src="${photoUrl(ph)}" alt=""/>
      <div class="del" data-del="${ph.id}"><i class="fa-solid fa-xmark"></i></div>
    </div>
  `).join("") + `<div class="photo-add" id="m-photo-add">
    <i class="fa-solid fa-camera"></i>
    <span>Add</span>
  </div>`;
  strip.querySelectorAll(".photo-thumb img").forEach(img=>{
    img.addEventListener("click", e=>{
      e.stopPropagation();
      const id = parseInt(img.parentElement.dataset.pid);
      const ph = currentModalPhotos.find(x=>x.id===id);
      if(ph) openLightbox(photoUrl(ph), id);
    });
  });
  strip.querySelectorAll("[data-del]").forEach(d=>{
    d.addEventListener("click", async e=>{
      e.stopPropagation();
      const id = parseInt(d.dataset.del);
      if(confirm("Delete this photo?")){
        await deletePhoto(id);
        releasePhotoUrl(id);
        currentModalPhotos = currentModalPhotos.filter(x=>x.id!==id);
        renderPhotoStrip(p);
        $("#m-act-cam").innerHTML = `<i class="fa-solid fa-camera"></i> ${currentModalPhotos.length?`Photo (${currentModalPhotos.length})`:"Take Photo"}`;
        toast("Photo deleted");
        render();
      }
    });
  });
  $("#m-photo-add").addEventListener("click", ()=> openPhotoCapture(p.id));
}

function closeModal(){
  $("#modal-back").classList.remove("open");
  document.body.style.overflow = "";
  currentModalId = null;
}
$("#m-close").addEventListener("click", closeModal);
$("#modal-back").addEventListener("click", e=>{
  if(e.target.id==="modal-back") closeModal();
});
document.addEventListener("keydown", e=>{if(e.key==="Escape"){closeModal();closeLightbox();}});

/* ==================== PHOTO CAPTURE ==================== */
let photoTargetId = null;
function openPhotoCapture(productId){
  if(!('indexedDB' in window)){
    toast("Photo storage isn't available in this browser/mode");
    return;
  }
  photoTargetId = productId;
  $("#photo-input").click();
}
$("#photo-input").addEventListener("change", async e=>{
  const files = Array.from(e.target.files || []);
  const productId = photoTargetId;
  e.target.value = ""; // reset immediately so picking the same file again still fires "change"
  if(!files.length || !productId) return;
  for(const f of files){
    await savePhotoFromFile(f, productId);
  }
});
async function savePhotoFromFile(file, productId){
  if(!file || !file.type || !file.type.startsWith("image/")){
    toast("That file isn't an image");
    return;
  }
  try{
    // Resize to max 1600px to keep storage reasonable
    const blob = await resizeImage(file, 1600, 0.85);
    await savePhoto(productId, blob);
    toast("Photo saved ✓");
  } catch(err){
    console.error("Failed to save photo", err);
    toast("Couldn't read that photo (try a JPEG/PNG instead of HEIC)");
    return;
  }
  // If modal is open for this product, refresh
  if(currentModalId === productId){
    currentModalPhotos = await getPhotosForProduct(productId);
    const p = PRODUCTS.find(x=>x.id===productId);
    renderPhotoStrip(p);
    $("#m-act-cam").innerHTML = `<i class="fa-solid fa-camera"></i> Photo (${currentModalPhotos.length})`;
  }
  render();
}
function resizeImage(file, maxDim, quality){
  // Try the modern, broader-format decoder first (handles more real-world phone
  // photo formats than an <img> tag alone in some browsers).
  if(window.createImageBitmap){
    return createImageBitmap(file)
      .then(bitmap => drawBitmapToBlob(bitmap, maxDim, quality))
      .catch(() => resizeImageViaImgTag(file, maxDim, quality));
  }
  return resizeImageViaImgTag(file, maxDim, quality);
}
function drawBitmapToBlob(bitmap, maxDim, quality){
  let {width, height} = bitmap;
  if(width > maxDim || height > maxDim){
    if(width > height) { height = height * maxDim/width; width = maxDim; }
    else { width = width * maxDim/height; height = maxDim; }
  }
  const c = document.createElement("canvas");
  c.width = width; c.height = height;
  c.getContext("2d").drawImage(bitmap, 0, 0, width, height);
  bitmap.close?.();
  return new Promise((res, rej)=>{
    c.toBlob(b => b ? res(b) : rej(new Error("canvas produced no blob")), "image/jpeg", quality);
  });
}
function resizeImageViaImgTag(file, maxDim, quality){
  return new Promise((res, rej)=>{
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = ()=>{
      let {width, height} = img;
      if(width > maxDim || height > maxDim){
        if(width > height) { height = height * maxDim/width; width = maxDim; }
        else { width = width * maxDim/height; height = maxDim; }
      }
      const c = document.createElement("canvas");
      c.width = width; c.height = height;
      c.getContext("2d").drawImage(img, 0, 0, width, height);
      c.toBlob(b=>{
        URL.revokeObjectURL(url);
        b ? res(b) : rej(new Error("canvas produced no blob"));
      }, "image/jpeg", quality);
    };
    // Do NOT silently fall back to the raw, undecoded file here — a file this
    // browser can't decode (e.g. HEIC on non-Safari browsers) can't be displayed
    // in an <img> tag either, so "saving" it anyway just produces a photo that
    // looks saved but never shows up. Reject instead so the caller can tell the user.
    img.onerror = ()=>{ URL.revokeObjectURL(url); rej(new Error("Browser could not decode this image format")); };
    img.src = url;
  });
}

/* ==================== LIGHTBOX ==================== */
let lightboxDeleteId = null;
function openLightbox(url, photoId){
  $("#lb-img").src = url;
  lightboxDeleteId = photoId;
  $("#lightbox").classList.add("open");
}
function closeLightbox(){$("#lightbox").classList.remove("open");$("#lb-img").src="";}
$("#lb-x").addEventListener("click", closeLightbox);
$("#lightbox").addEventListener("click", e=>{if(e.target.id==="lightbox") closeLightbox();});
$("#lb-del").addEventListener("click", async ()=>{
  if(lightboxDeleteId==null) return;
  if(!confirm("Delete this photo?")) return;
  await deletePhoto(lightboxDeleteId);
  releasePhotoUrl(lightboxDeleteId);
  closeLightbox();
  if(currentModalId){
    currentModalPhotos = await getPhotosForProduct(currentModalId);
    const p = PRODUCTS.find(x=>x.id===currentModalId);
    renderPhotoStrip(p);
  }
  render();
  toast("Photo deleted");
});

/* ==================== MY LIST ==================== */
function toggleList(id){
  if(state.myList.includes(id)) state.myList = state.myList.filter(x=>x!==id);
  else state.myList.push(id);
  localStorage.setItem("saputo-mylist", JSON.stringify(state.myList));
  render();
  toast(state.myList.includes(id) ? "Saved to My List ✓" : "Removed");
}
function addRecent(id){
  state.recents = [id, ...state.recents.filter(x=>x!==id)].slice(0,20);
  localStorage.setItem("saputo-recents", JSON.stringify(state.recents));
}

/* ==================== BOTTOM NAV ==================== */
$$(".bn").forEach(b=>{
  b.addEventListener("click", ()=>{
    const tab = b.dataset.tab;
    state.tab = tab;
    $$(".bn").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    if(tab==="scan"){
      $("#q").focus();
      toast("Type or paste a SKU code");
      return;
    }
    render();
  });
});
$("#clear-recents").addEventListener("click", ()=>{
  state.recents = [];
  localStorage.removeItem("saputo-recents");
  render();
  toast("Recents cleared");
});

/* ==================== QUICK ACTIONS ==================== */
$$(".qa").forEach(b=>{
  b.addEventListener("click", ()=>{
    const q = b.dataset.quick;
    if(q==="recents"){
      if(!state.recents.length){toast("No recent products yet");return;}
      state.tab = "browse";
      $$(".bn").forEach(x=>x.classList.remove("active"));
      $$(".bn")[0].classList.add("active");
      state.q="";
      render();
    } else if(q==="photos"){
      state.tab="photos";
      $$(".bn").forEach(x=>x.classList.remove("active"));
      $$(".bn")[1].classList.add("active");
      render();
    } else if(q==="all"){
      state.q="";$("#q").value="";
      state.cats.clear();state.brands.clear();
      $$("#cat-chips .chip").forEach(c=>c.classList.toggle("active", c.dataset.cat==="__all"));
      $$("#brand-chips .chip").forEach(c=>c.classList.toggle("active", c.dataset.brand==="__all"));
      state.tab="browse";
      $$(".bn").forEach(x=>x.classList.remove("active"));
      $$(".bn")[0].classList.add("active");
      render();
    }
  });
});

/* ==================== SEARCH & UI ==================== */
$("#q").addEventListener("input", e=>{
  state.q = e.target.value;
  $("#clear-x").classList.toggle("show", !!state.q);
  // SKU shortcut: if exact code match, jump straight to product
  const code = state.q.trim();
  if(code && codeIndex.has(code)){
    openModal(codeIndex.get(code));
    state.q = "";
    $("#q").value = "";
    $("#clear-x").classList.remove("show");
  }
  render();
});
$("#clear-x").addEventListener("click", ()=>{
  state.q="";$("#q").value="";$("#clear-x").classList.remove("show");render();$("#q").focus();
});
$("#sort").addEventListener("change", e=>{state.sort = e.target.value;render();});
$("#view-toggle").addEventListener("click", e=>{
  if(e.target.tagName!=="BUTTON") return;
  $$("#view-toggle button").forEach(b=>b.classList.remove("active"));
  e.target.classList.add("active");
  state.view = e.target.dataset.view;
  render();
});
$("#m-pic-tap").addEventListener("click", ()=>{
  if(currentModalId) openPhotoCapture(currentModalId);
});

/* ==================== TOAST ==================== */
let toastT;
function toast(msg){
  const t = $("#toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastT);
  toastT = setTimeout(()=>t.classList.remove("show"), 1600);
}

  const icon = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23f5b942'/%3E%3Ctext x='50' y='68' font-size='58' font-family='Georgia,serif' font-weight='900' text-anchor='middle' fill='%231a1a1a'%3ES%3C/text%3E%3C/svg%3E";

    name: "Saputo Products",
    short_name: "Saputo",
    start_url: ".",

})();

/* ==================== PWA INSTALL ==================== */
let deferredInstall = null;
window.addEventListener("beforeinstallprompt", e=>{
  e.preventDefault();
  deferredInstall = e;
  $("#install-btn").classList.add("show");
});
$("#install-btn").addEventListener("click", async ()=>{
  if(!deferredInstall) return;
  deferredInstall.prompt();
  const {outcome} = await deferredInstall.userChoice;
  if(outcome==="accepted"){
    $("#install-btn").classList.remove("show");
    toast("App installed ✓");
  }
  deferredInstall = null;
});
window.addEventListener("appinstalled", ()=>{
  $("#install-btn").classList.remove("show");
  toast("App installed ✓");
});

/* ==================== INIT ==================== */
buildChips();
render();
</script>
