<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produits - Livraison</title>
<style>
  :root{
    --bg:#0f1115;
    --card:#171a21;
    --card2:#1f232c;
    --accent:#4fd1c5;
    --accent2:#38b2ac;
    --text:#e8eaed;
    --muted:#8a8f98;
    --border:#2a2f3a;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    min-height:100vh;
  }
  header{
    position:sticky;top:0;z-index:10;
    background:var(--bg);
    padding:14px 16px 10px;
    border-bottom:1px solid var(--border);
  }
  h1{
    font-size:19px;
    margin:0 0 10px 0;
    font-weight:700;
    letter-spacing:.2px;
  }
  .search-wrap{
    position:relative;
  }
  #search{
    width:100%;
    padding:12px 14px 12px 38px;
    border-radius:12px;
    border:1px solid var(--border);
    background:var(--card2);
    color:var(--text);
    font-size:16px;
    outline:none;
  }
  #search:focus{border-color:var(--accent);}
  .search-icon{
    position:absolute;
    left:12px;top:50%;
    transform:translateY(-50%);
    opacity:.5;
    font-size:16px;
    pointer-events:none;
  }
  .count{
    color:var(--muted);
    font-size:12px;
    margin-top:6px;
  }
  main{
    padding:10px 12px 90px;
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(150px,1fr));
    gap:10px;
  }
  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:14px;
    overflow:hidden;
    cursor:pointer;
    display:flex;
    flex-direction:column;
    transition:transform .1s ease, border-color .15s ease;
    -webkit-tap-highlight-color:transparent;
  }
  .card:active{transform:scale(.97);}
  .card.has-photo{border-color:var(--accent2);}
  .thumb{
    width:100%;
    aspect-ratio:1/1;
    background:var(--card2);
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    position:relative;
  }
  .thumb img{
    width:100%;height:100%;object-fit:cover;
  }
  .thumb .placeholder{
    font-size:28px;
    opacity:.35;
  }
  .badge{
    position:absolute;
    top:6px;right:6px;
    background:rgba(0,0,0,.55);
    color:var(--accent);
    font-size:10px;
    padding:2px 6px;
    border-radius:8px;
    font-weight:600;
  }
  .info{
    padding:8px 10px 10px;
  }
  .name{
    font-size:12.5px;
    line-height:1.3;
    font-weight:600;
    display:-webkit-box;
    -webkit-line-clamp:3;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }
  .code{
    font-size:10px;
    color:var(--muted);
    margin-top:3px;
  }
  /* Modal */
  .overlay{
    position:fixed;inset:0;
    background:rgba(0,0,0,.7);
    display:none;
    align-items:flex-end;
    justify-content:center;
    z-index:100;
  }
  .overlay.open{display:flex;}
  .sheet{
    background:var(--card);
    width:100%;
    max-width:520px;
    border-radius:18px 18px 0 0;
    padding:16px;
    max-height:88vh;
    overflow-y:auto;
    animation:slideUp .18s ease;
  }
  @keyframes slideUp{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .sheet-header{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:10px;
    margin-bottom:12px;
  }
  .sheet-title{
    font-size:16px;
    font-weight:700;
    line-height:1.3;
  }
  .sheet-code{
    color:var(--muted);
    font-size:12px;
    margin-top:4px;
  }
  .close-btn{
    background:var(--card2);
    border:none;
    color:var(--text);
    width:32px;height:32px;
    border-radius:50%;
    font-size:16px;
    flex-shrink:0;
    cursor:pointer;
  }
  .photo-area{
    width:100%;
    aspect-ratio:1/1;
    max-height:50vh;
    background:var(--card2);
    border-radius:14px;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-bottom:14px;
    border:1px dashed var(--border);
  }
  .photo-area img{
    width:100%;height:100%;object-fit:contain;
  }
  .photo-area .empty{
    color:var(--muted);
    font-size:13px;
    text-align:center;
    padding:20px;
  }
  .btn-row{
    display:flex;
    gap:10px;
  }
  .btn{
    flex:1;
    padding:13px;
    border-radius:12px;
    border:none;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
  }
  .btn-primary{
    background:var(--accent);
    color:#00332f;
  }
  .btn-danger{
    background:#3a2226;
    color:#ff8080;
  }
  input[type=file]{display:none;}
  .empty-state{
    text-align:center;
    color:var(--muted);
    padding:60px 20px;
    font-size:14px;
  }
  .toast{
    position:fixed;
    bottom:20px;left:50%;
    transform:translateX(-50%) translateY(20px);
    background:var(--accent2);
    color:#00201d;
    padding:10px 18px;
    border-radius:20px;
    font-size:13px;
    font-weight:600;
    opacity:0;
    transition:all .25s ease;
    pointer-events:none;
    z-index:200;
  }
  .toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }
  .filter-row{
    display:flex;
    gap:6px;
    margin-top:10px;
    overflow-x:auto;
    padding-bottom:2px;
  }
  .chip{
    flex-shrink:0;
    background:var(--card2);
    border:1px solid var(--border);
    color:var(--muted);
    padding:6px 12px;
    border-radius:16px;
    font-size:12px;
    cursor:pointer;
    white-space:nowrap;
  }
  .chip.active{
    background:var(--accent);
    color:#00332f;
    border-color:var(--accent);
    font-weight:600;
  }
</style>
</head>
<body>

<header>
  <h1>📦 Produits — Livraison</h1>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input id="search" type="text" placeholder="Chercher un produit ou un code..." autocomplete="off">
  </div>
  <div class="filter-row" id="filterRow">
    <div class="chip active" data-filter="all">Tous</div>
    <div class="chip" data-filter="photo">Avec photo</div>
    <div class="chip" data-filter="nophoto">Sans photo</div>
  </div>
  <div class="count" id="count"></div>
</header>

<main>
  <div class="grid" id="grid"></div>
  <div class="empty-state" id="emptyState" style="display:none;">Aucun produit trouvé.</div>
</main>

<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="sheet-header">
      <div>
        <div class="sheet-title" id="sheetTitle"></div>
        <div class="sheet-code" id="sheetCode"></div>
      </div>
      <button class="close-btn" id="closeBtn">✕</button>
    </div>
    <div class="photo-area" id="photoArea">
      <div class="empty">Aucune photo — ajoutez-en une</div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="addPhotoBtn">📷 Ajouter / Changer photo</button>
      <button class="btn btn-danger" id="removePhotoBtn">🗑️ Retirer</button>
    </div>
    <input type="file" id="fileInput" accept="image/*" capture="environment">
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ---------- Product data (name, code) ----------
const PRODUCTS = [
  ["SAP PZMZ 20% 3D BLOC 10x2.4KG", "487299"],
  ["SAP GOLD PMZ 20% 3D BLOC 10x2.4KG", "441140"],
  ["SAP 5.5G BEURRE SALE PORTS*300", "71947"],
  ["BLV GARNITURE BACON PRÉCUIT 3x2KG", "87384"],
  ["VIA PEPPERONI GROS TR V.S. 3\" 2x5KG", "52889"],
  ["MAP BOÎTE PIZZA OND W/B 9\" 50/BDL", "89142"],
  ["BLV 16L HUILE CANOLA (BTE)", "78661"],
  ["BLV 20KG FARINE FORTE", "3489"],
  ["BLV 20KG FARINE TOUT USAGE", "3492"],
  ["SAP MÉLANGE NACHO RÂPÉ 4x2.5KG", "71834"],
  ["ARM 4.54KG CHEDDAR FORT (BLOC)", "486634"],
  ["SAP 454G BEURRE SALÉ *25", "103126"],
  ["SAP SALTED BUTTER FROZEN 25x454G", "3126"],
  ["BNB OEUFS VRAC BLANCS GROS", "68900"],
  ["BNB EGGS CAT A BIG WHITE 15/DZ", "200154"],
  ["NTL 100x15ML BTE 2% UHT", "127402"],
  ["NTL 2L LAIT HOMO (CTN)", "130014"],
  ["NTL 2L LAIT HOMO (CRUCHE)", "930006"],
  ["NTL 2L LAIT 2% (CTN)", "130026"],
  ["NTL 1L 2% MILK (JUG)", "127172"],
  ["NTL 100x15ML BTE 10% CRÈME UHT", "127400"],
  ["NTL 1L CRÈME À FOUETTER 35% (CTN)", "127250"],
  ["NTL 1L CRÈME CUISSON 35% (CTN)", "130631"],
  ["NTL 1L 15% COOKING CREAM (CTN)", "127164"],
  ["NTL 1L CRÈME 10% (CTN)", "127251"],
  ["SAP RICOTTA (PAPIER) 8x300G", "1901"],
  ["SAP RICOTTA CRÉMEUSE TRAD 6x400G", "462027"],
  ["SAP 3KG FIOR DI LATTE (SEAU/PAIL)", "51150"],
  ["BLV 5K CUP & CHAR PEPPERONI TR", "89631"],
  ["SAP BEURRE NON-SALÉ 1x25KG", "3131"],
  ["SAP 25KG BEURRE NON-SALÉ 82%", "71919"],
  ["MZB PZMZ IQF DICED 3D 2x5KG", "433178"],
  ["MZB 2.5KG VALUE MOZZ SHRED *4", "487750"],
  ["ORB 125G BURRATINI *6", "469227"],
  ["WOO 1KG ORIGINAL GOAT CRUMBLE *2", "820164"],
  ["SAP 1.9KG PROVOLONE *2", "414266"],
  ["SAP 2.5KG PARMESAN RÂPÉ PUR", "133117"],
  ["SAP 2.268KG PARMESAN RÂPÉ *4", "15113"],
  ["SAP PARM LÉGER RÂPÉ ANGE 2x1KG", "487264"],
  ["SAP 2.5KG PZMZ 17% RÂPÉ 3D *4", "487245"],
  ["SAP MASCARPONE 6x475G", "50578"],
  ["FML PANCETTA MILD (RW) 5x2KG", "87229"],
  ["BLV DRY CURED SLICED PEPPERONI 2x5.67KG", "9938"],
  ["VSO W. PEEL PEAR TOMATO 6x100oz", "9799"],
  ["FAP CANTONNIER BÛCHE (PV) 2.2KG", "41489"],
  ["FAP BRIE CARRÉ CANADIEN (PV) 1.25KG", "41133"],
  ["FAP CAPRINY CHÈVRE FRAIS 2x1KG", "41225"],
  ["SAP 3KG BOCCONCINI (BL) REG", "50167"],
  ["SAP 3KG FETA CHAUDIÈRE", "51690"],
  ["SAP FETA ÉMIETTÉE 4x1KG", "489159"],
  ["SAP 3KG FETA CUBES (SEAU)", "41527"],
  ["KRS OLIVES KALAMATA TR 10x1KG", "74806"],
  ["KFT 1.5KG PHILADELPHIA *6", "64344"],
  ["KFT 3KG SPREAD PHILADELPHIA", "64423"],
  ["VTT 2KG MOZZ BASE DE PLANTE *3", "50585"],
  ["GDI 4.8KG GRANA PADANO 1/8", "15074"],
  ["SAP 5KG PARM REGGIANO 1/8", "15136"],
  ["DLD 4KG YOGOURT BRASSÉ VANILLE", "164357"],
  ["DLD 4L 14% SOUR CREAM", "165358"],
  ["NLS 500ML CRÈME SURE (POT) *6", "271268"],
  ["NLS 1L BABEURRE (CTN) *16", "271038"],
  ["//KGY NAPF (BLOC) 52x340G", "410105"],
  ["EMI 2.5K GRUYÈRE SUISSE KING", "959"],
  ["SMN 300G SAUCE CHORIZO FORT *12", "88940"],
  ["UCO 340G ANCHOIS *24", "88363"],
  ["NTT 4KG YOGOURT STYLE GREC", "162126"],
  ["ARM 2.25KG CHEDDAR FORT (JN)", "805103"],
  ["SAP DORÉ-MI HALOUMI (PV) 6x235G", "41734"],
  ["TYS 2.27K MCX BACON FUMÉ 1/2 *2", "89721"],
  ["SLA PEPPERONI DC TR DRY CURE 2x3.4KG", "2612"],
  ["SAP 250G MOZZARINA FRAIS *6", "402771"]
];

// ---------- Storage helpers ----------
const STORE_KEY = "produitsPhotos_v1";
function loadPhotos(){
  try{ return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }
  catch(e){ return {}; }
}
function savePhotos(obj){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(obj)); }
  catch(e){ showToast("Erreur: stockage plein"); }
}
let photos = loadPhotos();

// ---------- Render ----------
const grid = document.getElementById('grid');
const emptyState = document.getElementById('emptyState');
const countEl = document.getElementById('count');
let currentFilter = 'all';
let currentQuery = '';

function slug(code){ return code; }

function render(){
  const q = currentQuery.trim().toLowerCase();
  let items = PRODUCTS.filter(([name, code]) => {
    if(q && !(name.toLowerCase().includes(q) || code.includes(q))) return false;
    const hasPhoto = !!photos[code];
    if(currentFilter === 'photo' && !hasPhoto) return false;
    if(currentFilter === 'nophoto' && hasPhoto) return false;
    return true;
  });

  grid.innerHTML = '';
  items.forEach(([name, code]) => {
    const hasPhoto = photos[code];
    const card = document.createElement('div');
    card.className = 'card' + (hasPhoto ? ' has-photo' : '');
    card.onclick = () => openSheet(name, code);
    card.innerHTML = `
      <div class="thumb">
        ${hasPhoto ? `<img src="${hasPhoto}">` : `<span class="placeholder">🧀</span>`}
        ${hasPhoto ? `<span class="badge">✓</span>` : ``}
      </div>
      <div class="info">
        <div class="name">${name}</div>
        <div class="code">#${code}</div>
      </div>
    `;
    grid.appendChild(card);
  });

  emptyState.style.display = items.length ? 'none' : 'block';
  countEl.textContent = `${items.length} produit${items.length!==1?'s':''}`;
}

// ---------- Search / filters ----------
document.getElementById('search').addEventListener('input', (e) => {
  currentQuery = e.target.value;
  render();
});

document.getElementById('filterRow').addEventListener('click', (e) => {
  const chip = e.target.closest('.chip');
  if(!chip) return;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  currentFilter = chip.dataset.filter;
  render();
});

// ---------- Sheet / modal ----------
const overlay = document.getElementById('overlay');
const sheetTitle = document.getElementById('sheetTitle');
const sheetCode = document.getElementById('sheetCode');
const photoArea = document.getElementById('photoArea');
const fileInput = document.getElementById('fileInput');
let activeCode = null;

function openSheet(name, code){
  activeCode = code;
  sheetTitle.textContent = name;
  sheetCode.textContent = '#' + code;
  renderPhotoArea();
  overlay.classList.add('open');
}
function closeSheet(){
  overlay.classList.remove('open');
  activeCode = null;
  render();
}
function renderPhotoArea(){
  const p = photos[activeCode];
  photoArea.innerHTML = p
    ? `<img src="${p}">`
    : `<div class="empty">Aucune photo — ajoutez-en une</div>`;
}

document.getElementById('closeBtn').onclick = closeSheet;
overlay.addEventListener('click', (e) => { if(e.target === overlay) closeSheet(); });

document.getElementById('addPhotoBtn').onclick = () => fileInput.click();

fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if(!file || !activeCode) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    photos[activeCode] = ev.target.result;
    savePhotos(photos);
    renderPhotoArea();
    showToast("Photo enregistrée ✓");
  };
  reader.readAsDataURL(file);
  fileInput.value = '';
});

document.getElementById('removePhotoBtn').onclick = () => {
  if(!activeCode) return;
  delete photos[activeCode];
  savePhotos(photos);
  renderPhotoArea();
  showToast("Photo retirée");
};

// ---------- Toast ----------
let toastTimer;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1600);
}

render();
</script>
</body>
</html>
